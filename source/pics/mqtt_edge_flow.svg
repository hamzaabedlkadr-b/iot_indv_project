<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">MQTT edge communication flow</title>
  <desc id="desc">Diagram showing ESP32 local processing, MQTT publish over WiFi, MQTT broker, Python edge listener, and saved result files.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#172235"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15395a"/>
      <stop offset="100%" stop-color="#0e253b"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#28503d"/>
      <stop offset="100%" stop-color="#193328"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4b3d73"/>
      <stop offset="100%" stop-color="#2b2445"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8dd7ff"/>
    </marker>
  </defs>

  <rect width="1280" height="520" rx="32" fill="url(#bg)"/>
  <text x="48" y="58" fill="#f5fbff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="34" font-weight="700">MQTT Edge Communication Flow</text>
  <text x="48" y="92" fill="#b8c9d9" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="18">The ESP32 sends one aggregate per 5-second window, not raw samples.</text>

  <g filter="url(#shadow)">
    <rect x="50" y="140" width="250" height="230" rx="22" fill="url(#cardA)" stroke="#386b94" stroke-width="2"/>
    <text x="76" y="182" fill="#ffffff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="24" font-weight="700">ESP32 / Heltec</text>
    <text x="76" y="221" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">1. Generate signal</text>
    <text x="76" y="252" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">2. Sample at 50 Hz</text>
    <text x="76" y="283" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">3. FFT detects 5 Hz</text>
    <text x="76" y="314" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">4. Adapt to 40 Hz</text>
    <text x="76" y="345" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">5. Compute average</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="382" y="144" width="220" height="222" rx="22" fill="#11273c" stroke="#3f789e" stroke-width="2"/>
    <text x="414" y="186" fill="#ffffff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="24" font-weight="700">MQTT JSON</text>
    <text x="414" y="227" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="16">window_id</text>
    <text x="414" y="255" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="16">sample_count</text>
    <text x="414" y="283" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="16">average_value</text>
    <text x="414" y="311" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="16">dominant_frequency</text>
    <text x="414" y="339" fill="#dcecff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="16">timing fields</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="690" y="140" width="230" height="230" rx="22" fill="url(#cardB)" stroke="#54a27d" stroke-width="2"/>
    <text x="726" y="184" fill="#ffffff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="24" font-weight="700">MQTT Broker</text>
    <text x="726" y="224" fill="#e2fff0" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">Plain: mqtt://1883</text>
    <text x="726" y="255" fill="#e2fff0" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">Secure: mqtts://8883</text>
    <text x="726" y="286" fill="#e2fff0" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">Topic-based routing</text>
    <text x="726" y="317" fill="#e2fff0" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">TLS certificate check</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1010" y="140" width="220" height="230" rx="22" fill="url(#cardC)" stroke="#836fd2" stroke-width="2"/>
    <text x="1040" y="184" fill="#ffffff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="24" font-weight="700">Edge Listener</text>
    <text x="1040" y="224" fill="#efeaff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">Python subscriber</text>
    <text x="1040" y="255" fill="#efeaff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">Receives windows</text>
    <text x="1040" y="286" fill="#efeaff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">Computes latency</text>
    <text x="1040" y="317" fill="#efeaff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="17">Saves CSV / JSONL</text>
  </g>

  <line x1="305" y1="255" x2="372" y2="255" stroke="#8dd7ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="608" y1="255" x2="680" y2="255" stroke="#8dd7ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="925" y1="255" x2="1000" y2="255" stroke="#8dd7ff" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="314" y="232" fill="#8dd7ff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="15" font-weight="700">publish</text>
  <text x="620" y="232" fill="#8dd7ff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="15" font-weight="700">WiFi</text>
  <text x="940" y="232" fill="#8dd7ff" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="15" font-weight="700">subscribe</text>

  <rect x="96" y="418" width="1088" height="54" rx="18" fill="#101a28" stroke="#2a3d54"/>
  <text x="122" y="452" fill="#d7e9f7" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="18">
    Result: the nearby edge server receives the required aggregate value, plus FFT, sampling-rate, profile, and latency metadata.
  </text>
</svg>
