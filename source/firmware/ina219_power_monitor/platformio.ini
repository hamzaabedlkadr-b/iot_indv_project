[env:esp32dev_monitor]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit INA219@^1.2.3

[env:heltec_v3_monitor]
platform = espressif32
framework = arduino
board = heltec_wifi_lora_32_V3
monitor_speed = 115200
build_flags =
    -DINA219_I2C_SDA_PIN=41
    -DINA219_I2C_SCL_PIN=42
lib_deps =
    adafruit/Adafruit INA219@^1.2.3
